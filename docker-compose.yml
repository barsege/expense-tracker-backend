services:
  db:
    image: postgres:16
    container_name: expense_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: expense
      POSTGRES_USER: expense
      POSTGRES_PASSWORD: expense
    ports:
      - "5432:5432"
    volumes:
      - expense_pgdata:/var/lib/postgresql/data

volumes:
  expense_pgdata: